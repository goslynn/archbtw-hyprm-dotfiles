# Catppuccin Mocha for mako
# Include from mako/config with: include=~/.config/themes/catppuccin/mocha/mako.conf

background-color=#1e1e2e
text-color=#cdd6f4
border-color=#89b4fa
progress-color=over #313244

[urgency=low]
border-color=#94e2d5

[urgency=normal]
border-color=#89b4fa

[urgency=high]
border-color=#f38ba8
default-timeout=0
