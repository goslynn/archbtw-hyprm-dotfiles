# Services launched once at Hyprland startup.
# Reminder: exec-once does NOT fire on `hyprctl reload`.

exec-once = waybar
exec-once = mako
exec-once = nm-applet --indicator

# Wallpaper: waypaper-engine daemon (re-applies last wallpaper from its gallery
# DB at ~/.config/waypaper-engine/). GUI picker bound to SUPER+W in keybinds.conf.
exec-once = waypaper-daemon
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
