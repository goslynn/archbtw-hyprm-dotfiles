# Monitors — https://wiki.hypr.land/Configuring/Monitors/
#
# Runtime configuration is managed by **shikane** (started via exec-once in
# autostart.conf). Profiles live at ~/.dotfiles/shikane/.config/shikane/config.toml.
# shikane picks a profile by EDID/output name on hotplug and applies it via
# the wlr-output-management protocol, overriding the directive below.
#
# The catch-all line is a bootstrap fallback applied before shikane connects
# (and if shikane is not running). Don't add static `monitor=` lines for known
# displays here — add a profile to shikane instead.
monitor=,preferred,auto,1.33
