# Look & feel — general/decoration/animations

general {
    gaps_in  = 4
    gaps_out = 8
    border_size = 2
    col.active_border   = $blue $mauve 45deg
    col.inactive_border = $surface0
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 8
    active_opacity   = 1.0
    inactive_opacity = 1.0
    shadow {
        enabled = true
        range = 6
        render_power = 2
        color = rgba(11111baa)
    }
    blur {
        enabled = false
    }
}

animations {
    enabled = true
    bezier = snap, 0.2, 0.9, 0.1, 1.0
    animation = windows,     1, 3, snap, popin 90%
    animation = windowsOut,  1, 3, snap, popin 90%
    animation = border,      1, 4, default
    animation = fade,        1, 3, default
    animation = workspaces,  1, 3, snap, slide
}
