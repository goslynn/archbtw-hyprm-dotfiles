# Window rules — Hyprland 0.55 syntax:
#   windowrule = ACTION VALUE, match:class REGEX [, match:title REGEX]

windowrule = suppress_event maximize,  match:class .*

windowrule = float 1,                  match:class ^(pavucontrol|nm-connection-editor|blueman-manager)$
windowrule = float 1,                  match:class ^(jetbrains-toolbox)$
windowrule = no_initial_focus 1,       match:class ^(jetbrains-.*)$, match:title ^(win|Windows)$

windowrule = float 1,                  match:title ^(Picture-in-Picture)$
windowrule = pin 1,                    match:title ^(Picture-in-Picture)$

# Portal file chooser (xdg-desktop-portal-termfilechooser launches kitty+yazi)
windowrule = float 1,                  match:class ^(termfilechooser)$
windowrule = size 60% 65%,             match:class ^(termfilechooser)$
windowrule = center 1,                 match:class ^(termfilechooser)$
