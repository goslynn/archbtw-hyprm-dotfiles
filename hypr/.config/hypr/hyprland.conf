# Hyprland — entry point. Real config lives in conf.d/
# Source order matters: variables and tokens must be defined before consumers.

# Theme palette ($blue, $base, etc.)
source = ~/.config/themes/catppuccin/mocha/hyprland.conf

# Boot-time
source = ~/.config/hypr/conf.d/monitors.conf
source = ~/.config/hypr/conf.d/env.conf
source = ~/.config/hypr/conf.d/programs.conf

# Look & behavior
source = ~/.config/hypr/conf.d/style.conf
source = ~/.config/hypr/conf.d/layout.conf
source = ~/.config/hypr/conf.d/input.conf

# Runtime
source = ~/.config/hypr/conf.d/autostart.conf
source = ~/.config/hypr/conf.d/rules.conf
source = ~/.config/hypr/conf.d/keybinds.conf
