# shikane — dynamic monitor profiles applied on hotplug.
#
# Profile selection: shikane matches profiles top-to-bottom. The first profile
# whose `[[profile.output]]` set fully matches the currently connected outputs
# wins and is applied automatically.
#
# Manual override (e.g. swap from home-mono to home-extend without unplugging):
#   shikanectl switch home-extend
#
# Hardware on this machine:
#   - eDP-1                                       (laptop, 2560x1600@60, Lenovo LEN151WQXGA)
#   - "Samsung Electric Company LS32D70xE HCNY900008"  (home 4K, 3840x2160@60)
#
# Edit this file at ~/.dotfiles/shikane/.config/shikane/config.toml
# (symlinked from ~/.config/shikane/config.toml via stow).
# After edits: `shikanectl reload`

# ── 1. Home monitor only (preferred when both connected) ────────────────────
# Laptop lid closed / hidden behind monitor — single 4K display, scale 1.8.
[[profile]]
name = "home-mono"

[[profile.output]]
match = "eDP-1"
enable = false

[[profile.output]]
match = "Samsung Electric Company LS32D70xE HCNY900008"
enable = true
mode = "3840x2160@60Hz"
position = "0,0"
scale = 1.33

# ── 2. Home monitor + laptop extended (laptop to the right) ─────────────────
# Manual switch only (`shikanectl switch home-extend`) — same outputs as
# home-mono so home-mono wins auto-match by being listed first.
[[profile]]
name = "home-extend"

[[profile.output]]
match = "Samsung Electric Company LS32D70xE HCNY900008"
enable = true
mode = "3840x2160@60Hz"
position = "0,0"
scale = 1.8

[[profile.output]]
match = "eDP-1"
enable = true
mode = "2560x1600@60Hz"
# Monitor logical width at scale 1.8 = round(3840/1.8) = 2133 → laptop sits there.
position = "2133,0"
scale = 1.33

# ── 3. Unknown external monitor (fallback, scale 1.33) ──────────────────────
# Matches by kernel output name (any HDMI/DP) — only fires when the specific
# Samsung profiles above didn't match. Laptop disabled, external as sole display.
[[profile]]
name = "external-hdmi"

[[profile.output]]
match = "eDP-1"
enable = false

[[profile.output]]
match = "HDMI-A-1"
enable = true
position = "0,0"
scale = 1.33

[[profile]]
name = "external-dp"

[[profile.output]]
match = "eDP-1"
enable = false

[[profile.output]]
match = "DP-1"
enable = true
position = "0,0"
scale = 1.33

# ── 4. Laptop only (no external connected) ──────────────────────────────────
[[profile]]
name = "laptop"

[[profile.output]]
match = "eDP-1"
enable = true
mode = "2560x1600@60Hz"
position = "0,0"
scale = 1.33
