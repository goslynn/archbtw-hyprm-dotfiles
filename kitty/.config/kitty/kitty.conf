font_size 12.0
window_padding_width 8
font_family      CaskaydiaCove Nerd Font
italic_font      auto
bold_font        auto
bold_italic_font auto
include theme.conf
background_opacity 0.93
dynamic_background_opacity yes
#hide_window_decorations yes
#confirm_os_window_close 0

# ZDOTDIR is set in /etc/zsh/zshenv, which clobbers the ZDOTDIR kitty injects
# for automatic shell integration. Disable the rc injection and load the
# integration manually from .zshrc instead (see zsh/.config/zsh/.zshrc).
shell_integration no-rc

